<div class="login-page">
  <div class="login-left">
    <div class="slogan">
      <p class="slogan-text">
        <span>Sueña,</span> 
        <span>Vive,</span>
        <span>Recuerda</span>
      </p>
    </div>
     <div class="particles">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
  </div>
  <div class="login-right">
    <div class="login">
      <div class="login-header">
        <h2>Iniciar Sesión</h2>
      </div>
      <form class="login-form" (ngSubmit)="onLogin()">
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" name="email" placeholder="tu@correo.com" [(ngModel)]="email" required>
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" [(ngModel)]="password"  required>
          <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
        </div>
        <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
        <button type="submit">Iniciar Sesión</button>
      </form>
      <div class="login-footer">
        <p>¿No tienes una cuenta? <a href="#">Regístrate</a></p>
      </div>
    </div>
  </div>
</div>
