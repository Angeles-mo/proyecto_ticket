<div class="register-page">
  <div class="register-left">
    <div class="slogan">
      <p class="slogan-text">
        <span>Sueña,</span> 
        <span>Vive,</span>
        <span>Recuerda</span>
      </p>
    </div>
     <div class="particles">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
  </div>
  <div class="register-right">
    <div class="register-form">
        <h1>Crear Cuenta</h1>
        <p>Únete a Ticketworld y comienza a disfrutar de tus eventos favoritos</p>
        <form class="row g-3">
            <div class="col-md-6">
                <label for="inputName" class="form-label">Nombre</label>
                <input type="text" class="form-control" id="inputName">
            </div>
            <div class="col-md-6">
                <label for="inputLastName" class="form-label">Apellidos</label>
                <input type="text" class="form-control" id="inputLastName">
            </div>
            <div class="col-md-6">
                <label for="inputEmail4" class="form-label">Email</label>
                <input type="email" class="form-control" id="inputEmail4">
            </div>
            <div class="col-md-6">
                <label for="inputPassword4" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="inputPassword4">
            </div>
            <div class="col-md-6">
                <label for="inputGender" class="form-label">Género</label>
                <select id="inputGender" class="form-select">
                    <option selected>Selecciona el género</option>
                    <option>Masculino</option>
                    <option>Femenino</option>
                    <option>Otro</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Quiero registrarme como:</label>
                <div class="d-flex gap-3 pt-2">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="userType" id="typeUser" value="usuario" checked>
                        <label class="form-check-label" for="typeUser">Usuario</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="userType" id="typeArtist" value="artista">
                        <label class="form-check-label" for="typeArtist">Artista</label>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <label for="inputAddress" class="form-label">Dirección</label>
                <input type="text" class="form-control" id="inputAddress" placeholder="1234 Main St">
            </div>
            <div class="col-12">
                <label for="inputAddress2" class="form-label">Dirección 2</label>
                <input type="text" class="form-control" id="inputAddress2" placeholder="Apartment, studio, or floor">
            </div>
            <div class="col-md-6">
                <label for="inputCity" class="form-label">Ciudad</label>
                <input type="text" class="form-control" id="inputCity">
            </div>
            <div class="col-md-4">
                <label for="inputState" class="form-label">Provincia</label>
                <select id="inputState" class="form-select">
                <option selected>Selecciona la provincia</option>
                <option>...</option>
                </select>
            </div>
            <div class="col-md-2">
                <label for="inputZip" class="form-label">Código Postal</label>
                <input type="text" class="form-control" id="inputZip">
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary">Registrarme</button>
            </div>
        </form>
    </div>
  </div>
</div>
