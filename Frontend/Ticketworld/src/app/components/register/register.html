<div class="register-page">
  <div class="register-left">
    <div class="slogan">
      <p class="slogan-text">
        <span>Sueña,</span> 
        <span>Vive,</span>
        <span>Recuerda</span>
      </p>
    </div>
     <div class="particles">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
  </div>
  <div class="register-right">
    <div class="register-form">
        <h1>Crear Cuenta</h1>
        <p>Únete a Ticketworld y comienza a disfrutar de tus eventos favoritos</p>
        <form class="row g-3">
          <!-- Email y contraseña (opcional en esta página) -->
          <div class="col-12">
            <label for="inputEmail" class="form-label">Correo Electrónico</label>
            <input type="email" class="form-control" id="inputEmail" placeholder="tu@email.com">
          </div>
          <div class="col-12">
            <label for="inputPassword" class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="inputPassword" placeholder="••••••••">
          </div>
          <!-- Sección de selección de tipo de cuenta -->
          <div class="col-12">
            <label class="form-label">Quiero registrarme como:</label>
            <div class="d-flex flex-column gap-3">
              <button type="button" class="btn btn-primary" routerLink="/user-register">
                Registrarse como Usuario
              </button>
              <button type="button" class="btn btn-primary" routerLink="/artist-register">
                Registrarse como Artista
              </button>
            </div>
          </div>
        </form>
    </div>
  </div>
</div>
